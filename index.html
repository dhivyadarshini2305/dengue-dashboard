<!DOCTYPE html>
<html>
<head>
    <title>Dengue Analysis Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background: #0f172a;
            color: white;
        }

        h1 {
            text-align: center;
            padding: 20px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            width: 320px;
        }

        .chart-card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            width: 500px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: none;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #38bdf8;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        canvas {
            background: white;
            border-radius: 10px;
            padding: 10px;
        }

        .kpi {
            text-align: center;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<h1>Dengue Analysis Dashboard</h1>

<div class="container">

    <!-- Prediction -->
    <div class="card">
        <h3>Predict Cases</h3>

        <input id="state" placeholder="State (e.g., Punjab)">
        <input id="year" placeholder="Year">
        <input id="deaths" placeholder="Deaths">

        <button onclick="predict()">Predict</button>

        <h3 id="result"></h3>
    </div>

    <!-- KPI -->
    <div class="card">
        <h3>Key Insights</h3>
        <div class="kpi">Total Cases: <span id="totalCases"></span></div>
        <div class="kpi">Top State: <span id="topState"></span></div>
    </div>

    <!-- Trend Chart -->
    <div class="chart-card">
        <h3>Year-wise Trend</h3>
        <canvas id="trendChart"></canvas>
    </div>

    <!-- State Chart -->
    <div class="chart-card">
        <h3>Top States</h3>
        <canvas id="stateChart"></canvas>
    </div>

</div>

<script>

let trendChart, stateChart;

// 🔮 Prediction
function predict() {
    let state = document.getElementById("state").value;
    let year = document.getElementById("year").value;
    let deaths = document.getElementById("deaths").value;

    fetch("https://dengue-dashboard-production.up.railway.app/predict", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            state: state,
            year: parseInt(year),
            deaths: parseInt(deaths)
        })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("result").innerText =
            "Predicted Cases: " + data.cases;
    });
}

// 📊 Trend Chart (REALISTIC SAMPLE)
trendChart = new Chart(document.getElementById("trendChart"), {
    type: "line",
    data: {
        labels: [2019, 2020, 2021, 2022, 2023],
        datasets: [{
            label: "Cases Trend",
            data: [5000, 2000, 4000, 7000, 9000],
            borderColor: "#38bdf8",
            fill: false
        }]
    }
});

// 📊 State Chart
stateChart = new Chart(document.getElementById("stateChart"), {
    type: "bar",
    data: {
        labels: ["Bihar", "Punjab", "Assam", "Delhi"],
        datasets: [{
            label: "Cases",
            data: [20000, 15000, 8000, 12000],
            backgroundColor: "#38bdf8"
        }]
    }
});

// 📊 KPI Data
document.getElementById("totalCases").innerText = "54000";
document.getElementById("topState").innerText = "Bihar";

</script>

</body>
</html>
