<!DOCTYPE html>
<html>
<head>
    <title>Dengue Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background: #0f172a;
            color: white;
        }

        h1 {
            text-align: center;
            padding: 20px;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 20px;
            flex-wrap: wrap;
        }

        .card {
            background: #1e293b;
            padding: 25px;
            border-radius: 12px;
            width: 320px;
            box-shadow: 0px 4px 20px rgba(0,0,0,0.4);
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: none;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #38bdf8;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #0ea5e9;
        }

        #result {
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
        }

        .chart-card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            width: 500px;
        }

        canvas {
            background: white;
            border-radius: 10px;
            padding: 10px;
        }
    </style>
</head>

<body>

<h1>Dengue Prediction Dashboard</h1>

<div class="container">

    <!-- Input Section -->
    <div class="card">
        <h3>Predict Dengue Cases</h3>

        <input id="state" placeholder="State (e.g., Punjab)">
        <input id="year" placeholder="Year">
        <input id="deaths" placeholder="Deaths">

        <button onclick="predict()">Predict</button>

        <div id="result"></div>
    </div>

    <!-- Chart Section -->
    <div class="chart-card">
        <h3>Prediction Chart</h3>
        <canvas id="chart"></canvas>
    </div>

</div>

<script>
let chart;

function predict() {
    let state = document.getElementById("state").value;
    let year = document.getElementById("year").value;
    let deaths = document.getElementById("deaths").value;

    fetch("https://dengue-dashboard-production.up.railway.app/predict", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            state: state,
            year: parseInt(year),
            deaths: parseInt(deaths)
        })
    })
    .then(res => res.json())
    .then(data => {

        document.getElementById("result").innerText =
            "Predicted Cases: " + data.cases;

        drawChart(data.cases);
    });
}

function drawChart(value) {
    if (chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"), {
        type: "bar",
        data: {
            labels: ["Predicted Cases"],
            datasets: [{
                label: "Cases",
                data: [value],
                backgroundColor: "#38bdf8"
            }]
        }
    });
}
</script>

</body>
</html>
